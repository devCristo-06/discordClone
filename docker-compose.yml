version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: discord_app

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - ./backend:/var/www

    networks:
      - discord_network

    depends_on:
      - mysql

  nginx:

    image: nginx:latest

    container_name: discord_nginx

    restart: unless-stopped

    ports:
      - "8000:80"

    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - discord_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: discord_frontend

    restart: unless-stopped

    working_dir: /app

    volumes:
      - ./frontend:/app
      - /app/node_modules

    ports:
      - "4200:4200"

    command: npm start -- --host 0.0.0.0

    depends_on:
      - app

    networks:
      - discord_network

  mysql:

    image: mysql:8.4

    container_name: discord_mysql

    restart: unless-stopped

    environment:

      MYSQL_ROOT_PASSWORD: root

      MYSQL_DATABASE: discord_clone

      MYSQL_USER: laravel

      MYSQL_PASSWORD: laravel

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - discord_network

  phpmyadmin:

    image: phpmyadmin/phpmyadmin

    container_name: discord_phpmyadmin

    restart: unless-stopped

    ports:
      - "8080:80"

    environment:

      PMA_HOST: mysql

      MYSQL_ROOT_PASSWORD: root

    depends_on:
      - mysql

    networks:
      - discord_network

volumes:

  mysql_data:

networks:

  discord_network:
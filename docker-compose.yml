services:
  mysql:
    image: mysql:8.0
    container_name: discordclone_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: discordclone
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: discordclone_laravel
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: discordclone_angular
    volumes:
      - ./frontend:/app
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  mysql_data:
